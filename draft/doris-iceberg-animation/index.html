<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apache Doris 4.1 × Iceberg V3 — 30s Promo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..800;1,6..72,400..700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
      background: #05080B;
      color: #E8EDF2;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    #root { min-height: 100vh; }

    /* custom scrollbar suppression inside stage */
    .canvas * { -webkit-user-select: none; user-select: none; }
  </style>

<body>
  <div id="root"></div>

  <!-- ─── Animation engine (inlined · avoids file:// CORS) ─────────────── -->
  <script type="text/babel">
    (function() {
      const { createContext, useContext, useState, useEffect, useRef, useCallback } = React;
      const TimeContext = createContext({ time: 0, duration: 10, playing: false });
      const SpriteContext = createContext(null);

      const Easing = {
        linear: t => t,
        easeIn: t => t * t,
        easeOut: t => 1 - (1 - t) * (1 - t),
        easeInOut: t => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2,
        expoOut: t => t === 1 ? 1 : 1 - Math.pow(2, -10 * t),
        overshoot: t => {
          const c1 = 1.70158, c3 = c1 + 1;
          return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
        },
        spring: t => {
          const c = (2 * Math.PI) / 3;
          return t === 0 ? 0 : t === 1 ? 1 : Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c) + 1;
        },
      };

      function interpolate(t, input, output, easing) {
        const [inStart, inEnd] = input;
        const [outStart, outEnd] = output;
        if (t <= inStart) return outStart;
        if (t >= inEnd) return outEnd;
        let progress = (t - inStart) / (inEnd - inStart);
        if (easing) progress = easing(progress);
        return outStart + (outEnd - outStart) * progress;
      }

      function useTime() { return useContext(TimeContext).time; }
      function useSprite() {
        const s = useContext(SpriteContext);
        return s || { t: 0, elapsed: 0, duration: 0 };
      }

      function Stage({ duration = 10, width = 1920, height = 1080, loop = true, children, bgColor = '#05080B' }) {
        const [time, setTime] = useState(0);
        const [playing, setPlaying] = useState(true);
        const [scale, setScale] = useState(1);
        const rafRef = useRef(null);

        const effectiveLoop = (typeof window !== 'undefined' && window.__recording) ? false : loop;

        useEffect(() => {
          function updateScale() {
            const vw = window.innerWidth;
            const vh = window.innerHeight - 56;
            setScale(Math.min(vw / width, vh / height));
          }
          updateScale();
          window.addEventListener('resize', updateScale);
          return () => window.removeEventListener('resize', updateScale);
        }, [width, height]);

        useEffect(() => {
          if (typeof window !== 'undefined') {
            window.__seek = (s) => { setTime(Math.max(0, Math.min(duration, s))); setPlaying(false); };
            window.__play = () => setPlaying(true);
          }
        }, [duration]);

        useEffect(() => {
          if (!playing) return;
          let cancelled = false;
          let last = null;
          function tick(now) {
            if (cancelled) return;
            if (last === null) {
              last = now;
              if (typeof window !== 'undefined') window.__ready = true;
            }
            const delta = (now - last) / 1000;
            last = now;
            setTime(prev => {
              const next = prev + delta;
              if (next >= duration) return effectiveLoop ? 0 : duration - 0.001;
              return next;
            });
            rafRef.current = requestAnimationFrame(tick);
          }
          const start = () => { if (!cancelled) rafRef.current = requestAnimationFrame(tick); };
          if (document.fonts && document.fonts.ready) document.fonts.ready.then(start);
          else start();
          return () => { cancelled = true; cancelAnimationFrame(rafRef.current); };
        }, [playing, duration, effectiveLoop]);

        const handleSeek = useCallback((e) => {
          const rect = e.currentTarget.getBoundingClientRect();
          const ratio = (e.clientX - rect.left) / rect.width;
          setTime(Math.max(0, Math.min(duration, ratio * duration)));
          setPlaying(false);
        }, [duration]);

        const ctx = { time, duration, playing, setPlaying, setTime };
        const progress = time / duration;

        return (
          <TimeContext.Provider value={ctx}>
            <div style={{position:'fixed', inset:0, background:'#000', display:'flex', flexDirection:'column'}}>
              <div style={{flex:1, position:'relative', overflow:'hidden'}}>
                <div className="canvas" style={{
                  position:'absolute', top:'50%', left:'50%', width, height,
                  background: bgColor, overflow:'hidden',
                  transformOrigin:'center center',
                  transform:`translate(-50%,-50%) scale(${scale})`,
                }}>
                  {children}
                </div>
              </div>
              <div className="no-record" style={{
                position:'fixed', bottom:0, left:0, right:0,
                background:'rgba(0,0,0,0.8)', backdropFilter:'blur(10px)',
                padding:'12px 20px', display:'flex', alignItems:'center', gap:16,
                color:'#fff', fontSize:12, zIndex:100,
              }}>
                <button onClick={()=>setPlaying(p=>!p)} style={{
                  background:'none', border:'1px solid rgba(255,255,255,0.3)', color:'#fff',
                  padding:'6px 14px', borderRadius:4, cursor:'pointer', fontSize:12,
                }}>{playing ? '⏸ Pause' : '▶ Play'}</button>
                <button onClick={()=>setTime(0)} style={{
                  background:'none', border:'1px solid rgba(255,255,255,0.3)', color:'#fff',
                  padding:'6px 14px', borderRadius:4, cursor:'pointer', fontSize:12,
                }}>⏮ Restart</button>
                <div style={{fontFamily:'JetBrains Mono, monospace', minWidth:90, fontVariantNumeric:'tabular-nums'}}>
                  {time.toFixed(2)}s / {duration.toFixed(2)}s
                </div>
                <div onMouseDown={handleSeek} style={{
                  flex:1, height:4, background:'rgba(255,255,255,0.2)',
                  borderRadius:2, position:'relative', cursor:'pointer',
                }}>
                  <div style={{position:'absolute', top:0, left:0, height:'100%',
                    background:'#fff', borderRadius:2, width:`${progress*100}%`,
                    pointerEvents:'none'}} />
                </div>
              </div>
            </div>
          </TimeContext.Provider>
        );
      }

      function Sprite({ start = 0, end, children, style }) {
        const { time } = useContext(TimeContext);
        const actualEnd = end == null ? Infinity : end;
        if (time < start || time >= actualEnd) return null;
        const duration = actualEnd - start;
        const elapsed = time - start;
        const t = duration === 0 ? 1 : Math.max(0, Math.min(1, elapsed / duration));
        return (
          <SpriteContext.Provider value={{ t, elapsed, duration, start, end: actualEnd }}>
            <div style={{position:'absolute', inset:0, ...style}}>{children}</div>
          </SpriteContext.Provider>
        );
      }

      window.Animations = { Stage, Sprite, useTime, useSprite, Easing, interpolate };
    })();
  </script>

  <!-- ─── Scenes ───────────────────────────────────────────────────────── -->
  <script type="text/babel">
    const { Stage, Sprite, useSprite, useTime, Easing, interpolate } = window.Animations;
    const { useState, useEffect, useRef } = React;

    /* Color tokens */
    const C = {
      bg: '#05080B',
      surface: '#0F141A',
      surfaceAlt: '#161C24',
      line: 'rgba(255,255,255,0.08)',
      ink: '#E8EDF2',
      inkMute: '#8B97A6',
      inkFaint: '#4B5663',
      dorisGreen: '#11A679',
      dorisGreenBright: '#1DD38F',
      dorisGreenGlow: 'rgba(17,166,121,0.35)',
      iceberg: '#5AA9E3',
      icebergDeep: '#277ABE',
      icebergLight: '#B8E1F3',
      warn: '#F5A623',
      danger: '#E4674F',
    };

    /* ============ Reusable primitives ============ */

    /* Terminal-style code block with per-line reveal */
    function CodeBlock({ lines, revealStarts, revealChunk = 0.8, width = 900, padding = 32 }) {
      const { elapsed } = useSprite();
      return (
        <div style={{
          width, padding, borderRadius: 14,
          background: 'rgba(16,22,30,0.96)',
          border: `1px solid ${C.line}`,
          boxShadow: '0 30px 80px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.03)',
          fontFamily: "'JetBrains Mono', Menlo, monospace",
          fontSize: 22, lineHeight: 1.7,
          color: C.ink,
        }}>
          {/* terminal dots */}
          <div style={{display:'flex', gap:8, marginBottom:18}}>
            {['#E4674F','#F5A623','#1DD38F'].map((c,i)=>(
              <div key={i} style={{width:12,height:12,borderRadius:'50%',background:c,opacity:0.85}}/>
            ))}
          </div>
          {lines.map((line, i) => {
            const start = revealStarts[i] || 0;
            const revealDone = Math.min(1, Math.max(0, (elapsed - start) / revealChunk));
            const charsToShow = Math.floor(line.text.length * revealDone);
            const shown = line.text.slice(0, charsToShow);
            const checkVis = elapsed > start + revealChunk + 0.1 ? 1 : 0;
            const lineStyle = line.highlight ? { color: C.dorisGreenBright } : {};
            return (
              <div key={i} style={{display:'flex', alignItems:'flex-start', gap:12, marginBottom:10, minHeight:32}}>
                <span style={{color: C.inkFaint, userSelect:'none'}}>›</span>
                <span style={{flex:1, whiteSpace:'pre-wrap', ...lineStyle}}>
                  <SyntaxedSQL text={shown} />
                  {revealDone > 0 && revealDone < 1 && (
                    <span style={{
                      display:'inline-block', width:10, height:22, background:C.dorisGreen,
                      verticalAlign:'middle', marginLeft:2,
                      animation:'blink 1s step-end infinite',
                    }}/>
                  )}
                </span>
                <span style={{
                  color: C.dorisGreenBright,
                  opacity: checkVis,
                  transform: `scale(${0.5 + checkVis * 0.5})`,
                  transition: 'transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)',
                  fontSize: 20, lineHeight: '32px',
                }}>✓</span>
              </div>
            );
          })}
        </div>
      );
    }

    /* Highlight SQL keywords inline */
    function SyntaxedSQL({ text }) {
      const KW = /\b(UPDATE|DELETE|FROM|SET|WHERE|MERGE|INTO|USING|ON|WHEN|MATCHED|NOT|THEN|INSERT|VALUES|AND|OR|AS)\b/g;
      const parts = [];
      let last = 0;
      let m;
      const re = new RegExp(KW.source, 'g');
      while ((m = re.exec(text)) !== null) {
        if (m.index > last) parts.push({ k: 'plain', s: text.slice(last, m.index) });
        parts.push({ k: 'kw', s: m[0] });
        last = m.index + m[0].length;
      }
      if (last < text.length) parts.push({ k: 'plain', s: text.slice(last) });
      return (
        <>
          {parts.map((p, i) =>
            p.k === 'kw'
              ? <span key={i} style={{color: C.iceberg, fontWeight: 600}}>{p.s}</span>
              : <span key={i} style={{color: C.ink}}>{p.s.replace(/'([^']*)'/g, (_,v)=>`'${v}'`)}</span>
          )}
        </>
      );
    }

    /* Reusable label pill */
    function Label({ children, color = C.iceberg, size = 14 }) {
      return (
        <div style={{
          display:'inline-flex', alignItems:'center', gap:8,
          padding:'6px 14px', borderRadius:999,
          background: `color-mix(in oklab, ${color} 14%, transparent)`,
          border: `1px solid color-mix(in oklab, ${color} 30%, transparent)`,
          color, fontSize:size, fontWeight:500, letterSpacing:'0.04em', textTransform:'uppercase',
          fontFamily:"'JetBrains Mono', monospace",
        }}>
          <span style={{width:6, height:6, borderRadius:'50%', background:color}}/>
          {children}
        </div>
      );
    }

    /* Corner watermark (survives across scenes; thin, non-obstructive) */
    function Watermark() {
      return (
        <div style={{
          position:'absolute', bottom:36, right:48,
          fontSize:12, color:'rgba(232,237,242,0.35)',
          letterSpacing:'0.2em', fontFamily:"'JetBrains Mono', monospace",
          pointerEvents:'none', zIndex:100, textTransform:'uppercase',
        }}>
          Created by Huashu-Design
        </div>
      );
    }

    /* ============ Scene 1 — Hook (0.0–4.5s) ============ */

    function Scene1Hook() {
      const { elapsed, t } = useSprite();

      const fadeIn = interpolate(elapsed, [0, 0.4], [0, 1], Easing.expoOut);
      const fadeOut = interpolate(elapsed, [4.5, 6.5], [0, 1], Easing.easeIn);
      const overallOp = fadeIn * (1 - fadeOut);

      /* Blocker chips slam in at t=2.8 and 3.2 */
      const chip1 = interpolate(elapsed, [2.8, 3.2], [0, 1], Easing.overshoot);
      const chip2 = interpolate(elapsed, [3.1, 3.55], [0, 1], Easing.overshoot);

      const sqlText = "UPDATE orders SET status = 'shipped' WHERE id = 1;";
      const revealTime = interpolate(elapsed, [0.6, 2.2], [0, 1], Easing.expoOut);
      const shown = sqlText.slice(0, Math.floor(sqlText.length * revealTime));

      const caption = interpolate(elapsed, [3.6, 4.1], [0, 1], Easing.expoOut);

      return (
        <div style={{
          position:'absolute', inset:0, opacity: overallOp,
          display:'flex', alignItems:'center', justifyContent:'center',
          flexDirection:'column',
          background:`radial-gradient(circle at 50% 40%, rgba(228,103,79,0.06) 0%, transparent 55%), ${C.bg}`,
        }}>
          {/* tiny timestamp overhead */}
          <div style={{
            position:'absolute', top:72,
            fontFamily:"'JetBrains Mono',monospace", fontSize:14,
            color:C.inkFaint, letterSpacing:'0.3em',
          }}>MONDAY · 03:42 AM</div>

          {/* terminal card */}
          <div style={{
            width: 1000, padding: 36,
            borderRadius: 16,
            background: 'rgba(15,20,26,0.95)',
            border: `1px solid ${C.line}`,
            boxShadow: '0 40px 100px rgba(0,0,0,0.5)',
            fontFamily: "'JetBrains Mono', monospace", fontSize: 24, color: C.ink,
            position: 'relative',
          }}>
            <div style={{display:'flex', gap:8, marginBottom:22}}>
              {['#E4674F','#F5A623','#1DD38F'].map((c,i)=>(
                <div key={i} style={{width:12,height:12,borderRadius:'50%',background:c,opacity:0.8}}/>
              ))}
              <div style={{marginLeft:16, fontSize:14, color:C.inkFaint, letterSpacing:'0.1em'}}>
                ~/analytics · doris
              </div>
            </div>

            <div style={{minHeight:44, display:'flex', alignItems:'baseline', gap:12}}>
              <span style={{color:C.dorisGreen}}>$</span>
              <span style={{lineHeight:1.5}}>
                <SyntaxedSQL text={shown} />
                {revealTime > 0 && revealTime < 1 && (
                  <span style={{
                    display:'inline-block', width:12, height:24, background:C.dorisGreenBright,
                    marginLeft:3, verticalAlign:'middle',
                  }}/>
                )}
              </span>
            </div>

            {/* blockers slam in */}
            {chip1 > 0 && (
              <div style={{
                position:'absolute', top:'60%', left:'12%',
                transform: `rotate(-6deg) scale(${chip1})`,
                transformOrigin:'center',
                opacity: chip1,
              }}>
                <div style={{
                  padding:'14px 22px', borderRadius:8,
                  background:'rgba(228,103,79,0.18)',
                  border:'2px solid rgba(228,103,79,0.65)',
                  color: '#F5B8AC', fontSize:20, fontWeight:600,
                  letterSpacing:'0.08em', textTransform:'uppercase',
                  boxShadow:'0 10px 30px rgba(228,103,79,0.25)',
                }}>
                  ⚠ JIRA-2341 · Platform team · queued
                </div>
              </div>
            )}
            {chip2 > 0 && (
              <div style={{
                position:'absolute', top:'62%', right:'10%',
                transform: `rotate(5deg) scale(${chip2})`,
                transformOrigin:'center',
                opacity: chip2,
              }}>
                <div style={{
                  padding:'14px 22px', borderRadius:8,
                  background:'rgba(245,166,35,0.16)',
                  border:'2px solid rgba(245,166,35,0.6)',
                  color: '#F7D38A', fontSize:20, fontWeight:600,
                  letterSpacing:'0.08em', textTransform:'uppercase',
                  boxShadow:'0 10px 30px rgba(245,166,35,0.25)',
                }}>
                  ⌛ Spark job · ETA 14 h
                </div>
              </div>
            )}
          </div>

          {/* bottom caption */}
          <div style={{
            position:'absolute', bottom:120,
            opacity: caption,
            transform: `translateY(${interpolate(caption,[0,1],[14,0])}px)`,
            fontFamily: "'Newsreader', serif",
            fontSize: 38, fontWeight: 300, fontStyle: 'italic',
            color: C.inkMute, letterSpacing: '0.01em',
          }}>
            One line of SQL. <span style={{color:C.ink}}>Fourteen hours of waiting.</span>
          </div>
        </div>
      );
    }

    /* ============ Scene 2 — Break (4.0–9.0s) ============ */

    function Scene2Break() {
      const { elapsed } = useSprite();
      const totalDur = 5;

      const fadeIn  = interpolate(elapsed, [0, 2.0], [0, 1], Easing.easeInOut);
      const fadeOut = interpolate(elapsed, [5.0, 7.0], [0, 1], Easing.easeInOut);
      const op = fadeIn * (1 - fadeOut);

      /* Doris logo card: slide in from left */
      const dorisEnter = interpolate(elapsed, [0.4, 1.6], [0, 1], Easing.expoOut);
      const dorisX = interpolate(dorisEnter, [0, 1], [-480, 0]);

      /* Iceberg logo card: slide in from right */
      const iceEnter = interpolate(elapsed, [0.8, 2.0], [0, 1], Easing.expoOut);
      const iceX = interpolate(iceEnter, [0, 1], [480, 0]);

      /* Center × glyph */
      const xGlyph = interpolate(elapsed, [1.8, 2.4], [0, 1], Easing.overshoot);

      /* Title */
      const titleT = interpolate(elapsed, [2.4, 3.3], [0, 1], Easing.expoOut);

      /* Subtitle */
      const subT = interpolate(elapsed, [3.2, 4.1], [0, 1], Easing.expoOut);

      return (
        <div style={{
          position:'absolute', inset:0, opacity:op,
          display:'flex', alignItems:'center', justifyContent:'center',
          flexDirection:'column', gap:64,
          background: `radial-gradient(circle at 50% 35%, rgba(17,166,121,0.08) 0%, transparent 60%), ${C.bg}`,
        }}>
          {/* Logo row */}
          <div style={{display:'flex', alignItems:'center', gap:72, position:'relative'}}>
            {/* Doris card */}
            <div style={{
              width: 320, height: 180,
              background: '#FAFBFC', borderRadius: 20,
              display:'flex', alignItems:'center', justifyContent:'center',
              boxShadow: '0 30px 80px rgba(17,166,121,0.25), 0 0 0 1px rgba(17,166,121,0.3)',
              transform: `translateX(${dorisX}px)`,
              opacity: dorisEnter,
            }}>
              <img src="assets/brand/doris-logo.svg" style={{width: 240, height: 'auto'}} alt="Apache Doris"/>
            </div>

            {/* Middle × */}
            <div style={{
              fontFamily: "'Newsreader', serif",
              fontSize: 88, fontWeight: 300,
              color: C.inkMute, opacity: xGlyph,
              transform: `scale(${0.5 + xGlyph*0.5}) rotate(${interpolate(xGlyph,[0,1],[-40,0])}deg)`,
            }}>×</div>

            {/* Iceberg card */}
            <div style={{
              width: 320, height: 180,
              background: '#FAFBFC', borderRadius: 20,
              display:'flex', alignItems:'center', justifyContent:'center',
              boxShadow: '0 30px 80px rgba(39,122,190,0.25), 0 0 0 1px rgba(39,122,190,0.3)',
              transform: `translateX(${iceX}px)`,
              opacity: iceEnter,
            }}>
              <img src="assets/brand/iceberg-logo.svg" style={{width: 240, height: 'auto'}} alt="Apache Iceberg"/>
            </div>
          </div>

          {/* Title */}
          <div style={{textAlign:'center', opacity: titleT}}>
            <div style={{
              fontFamily: "'Inter', sans-serif",
              fontSize: 96, fontWeight: 700,
              letterSpacing: '-0.035em', lineHeight: 1.05,
              color: C.ink,
              transform: `translateY(${interpolate(titleT,[0,1],[24,0])}px)`,
            }}>
              Doris 4.1 <span style={{color:C.dorisGreen}}>meets</span> Iceberg V3
            </div>
          </div>

          {/* Subtitle */}
          <div style={{
            opacity: subT,
            transform: `translateY(${interpolate(subT,[0,1],[18,0])}px)`,
            fontFamily: "'Inter', sans-serif",
            fontSize: 28, fontWeight: 400, letterSpacing: '0.02em',
            color: C.inkMute,
            textAlign:'center',
          }}>
            The full lakehouse lifecycle — <span style={{color:C.ink, fontWeight:500}}>in one SQL engine.</span>
          </div>
        </div>
      );
    }

    /* ============ Scene 3 — Full DML (8.8–13.5s) ============ */

    function Scene3DML() {
      const { elapsed } = useSprite();
      const fadeIn = interpolate(elapsed, [0, 2.0], [0, 1], Easing.easeInOut);
      const fadeOut = interpolate(elapsed, [5.0, 7.0], [0, 1], Easing.easeInOut);
      const op = fadeIn * (1 - fadeOut);

      const headerT = interpolate(elapsed, [0.1, 0.7], [0, 1], Easing.expoOut);

      const lines = [
        { text: "UPDATE orders SET status = 'shipped' WHERE id = 1;" },
        { text: "DELETE FROM orders WHERE dt = '2026-04-01';" },
        { text: "MERGE INTO orders t USING cdc s ON t.id = s.id" },
        { text: "  WHEN MATCHED THEN UPDATE SET status = s.status" },
        { text: "  WHEN NOT MATCHED THEN INSERT VALUES (s.id, s.name);" },
      ];

      return (
        <div style={{
          position:'absolute', inset:0, opacity:op,
          display:'flex', flexDirection:'column', alignItems:'center',
          justifyContent:'center', gap:40,
        }}>
          {/* Header */}
          <div style={{
            opacity: headerT,
            transform: `translateY(${interpolate(headerT,[0,1],[14,0])}px)`,
            display:'flex', flexDirection:'column', alignItems:'center', gap:18,
          }}>
            <Label color={C.dorisGreen}>01 · Full DML</Label>
            <div style={{
              fontFamily: "'Inter', sans-serif", fontSize: 76, fontWeight: 700,
              letterSpacing: '-0.035em', color: C.ink,
            }}>

        <div style={{
          position:'absolute', inset:0, opacity:op,
          display:'flex', flexDirection:'column', alignItems:'center',
          justifyContent:'center', gap: 40,
          background: `radial-gradient(circle at 50% 50%, rgba(17,166,121,0.08) 0%, transparent 60%), ${C.bg}`,
        }}>
          {/* Doris logo */}
          <div style={{
            padding: '32px 56px',
            background: '#FAFBFC', borderRadius: 20,
            boxShadow: '0 30px 80px rgba(17,166,121,0.3), 0 0 0 1px rgba(17,166,121,0.3)',
            transform: `scale(${0.8 + logoEnter*0.2})`,
            opacity: logoEnter,
          }}>
            <img src="assets/brand/doris-logo.svg" style={{height: 80, display:'block'}} alt="Apache Doris"/>
          </div>

          {/* Title */}
          <div style={{textAlign:'center', opacity: titleT,
            transform: `translateY(${interpolate(titleT,[0,1],[14,0])}px)`,
          }}>
            <div style={{
              fontFamily:"'Inter', sans-serif", fontSize:84, fontWeight:700,
              letterSpacing:'-0.035em', color: C.ink, lineHeight:1.15,
            }}>
              Apache Doris 4.1
            </div>
            <div style={{
              fontSize: 30, color: C.inkMute, marginTop: 12,
              fontWeight: 300, letterSpacing: '0.02em',
            }}>
              on Apache Iceberg <span style={{color:C.iceberg, fontWeight:500}}>V3</span>
            </div>
          </div>

          {/* URL */}
          <div style={{
            opacity: urlT,
            transform: `translateY(${interpolate(urlT,[0,1],[8,0])}px)`,
            marginTop: 20,
            padding: '12px 24px',
            borderRadius: 999,
            border: `1px solid ${C.line}`,
            color: C.inkMute,
            fontSize: 18, fontFamily: "'JetBrains Mono', monospace",
            letterSpacing: '0.08em',
          }}>
            doris.apache.org
          </div>
        </div>
      );
    }

    /* ============ Main ============ */

    function App() {
      return (
        <Stage duration={36.5} width={1920} height={1080} bgColor={C.bg}>
          <Sprite start={0}    end={6.5}>  <Scene1Hook /></Sprite>
          <Sprite start={4.5}  end={11.5}> <Scene2Break /></Sprite>
          <Sprite start={9.5}  end={16.5}> <Scene3DML /></Sprite>
          <Sprite start={14.5} end={22.5}> <Scene4DV /></Sprite>
          <Sprite start={20.5} end={27.5}> <Scene5Lineage /></Sprite>
          <Sprite start={25.5} end={32.5}> <Scene6Boom /></Sprite>
          <Sprite start={30.5} end={36.5}> <Scene7Landing /></Sprite>
          <Watermark />
        </Stage>
      );
    }

    /* Inline keyframes */
    const styleEl = document.createElement('style');
    styleEl.textContent = `
      @keyframes blink { 50% { opacity: 0; } }
    `;
    document.head.appendChild(styleEl);

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
