<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>JSON War</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%; width: 100%;
      background: #0a0818;
      color: #f5efe0;
      font-family: 'Fredoka', sans-serif;
      overflow-x: hidden;
      /* Mobile portrait only */
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
    }

    #root {
      min-height: 100svh;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
    }

    /* ── Keyframes ─────────────────────────────────────────────────────── */
    @keyframes starPop {
      from { opacity: 0.15; transform: scale(0.7); }
      to   { opacity: 0.85; transform: scale(1.3); }
    }

    @keyframes bossFloat {
      0%, 100% { transform: translateY(0px);  }
      50%       { transform: translateY(-7px); }
    }

    @keyframes bossShake {
      0%   { transform: translateX(0);    }
      25%  { transform: translateX(-7px); }
      75%  { transform: translateX(7px);  }
      100% { transform: translateX(0);    }
    }

    @keyframes bulletFly {
      from { transform: translateX(-50%) translateY(0);      opacity: 1;   }
      to   { transform: translateX(-50%) translateY(-260px); opacity: 0.2; }
    }

    @keyframes missileDown {
      from { transform: translateX(-50%) translateY(0);     opacity: 1;   }
      to   { transform: translateX(-50%) translateY(220px); opacity: 0.2; }
    }

    @keyframes aoeExpand {
      from { transform: translate(-50%,-50%) scale(0.3); opacity: 1;   }
      to   { transform: translate(-50%,-50%) scale(8);   opacity: 0;   }
    }

    @keyframes damageFloat {
      0%   { transform: translate(-50%,-50%) scale(0);   opacity: 1; }
      15%  { transform: translate(-50%,-50%) scale(1.3); opacity: 1; }
      35%  { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
      100% { transform: translate(-50%,-90px) scale(1);  opacity: 0; }
    }

    @keyframes explodeParticle {
      0%   { transform: rotate(var(--angle,0deg)) translateX(0);    opacity: 1; }
      100% { transform: rotate(var(--angle,0deg)) translateX(65px); opacity: 0; }
    }

    @keyframes explodeCore {
      0%   { transform: scale(0);   opacity: 1;   }
      60%  { transform: scale(1.6); opacity: 0.8; }
      100% { transform: scale(3);   opacity: 0;   }
    }

    @keyframes enginePulse {
      from { opacity: 0.3; transform: scaleX(0.7); }
      to   { opacity: 0.8; transform: scaleX(1.3); }
    }

    @keyframes ctaAttention {
      0%, 100% { transform: scale(1);    }
      50%       { transform: scale(1.04); }
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    @keyframes blink {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 0;   }
    }

    @keyframes bossAttackFly {
      from { transform: translateX(-50%) translateY(0);    opacity: 1;   }
      to   { transform: translateX(-50%) translateY(250px); opacity: 0.2; }
    }

    @keyframes bulletFlyHit {
      from { transform: translateX(-50%) translateY(0);     opacity: 1;   }
      to   { transform: translateX(-50%) translateY(-52vh); opacity: 0;   }
    }

    @keyframes bulletFlyMiss {
      from { transform: translateX(-50%) translateY(0);     opacity: 1;   }
      to   { transform: translateX(-50%) translateY(-80vh); opacity: 0.2; }
    }

    /* Bullet stops at ArcShield (positioned at bottom:55%); bullet starts at bottom:23%. */
    @keyframes bulletFlyBlocked {
      0%   { transform: translateX(-50%) translateY(0);     opacity: 1; }
      82%  { transform: translateX(-50%) translateY(-28vh); opacity: 1; }
      100% { transform: translateX(-50%) translateY(-28vh); opacity: 0; }
    }

    @keyframes confettiFall {
      0%   { transform: translateY(0)     rotate(0deg);   opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    @keyframes bulletFlyFull {
      from { transform: translateX(-50%) translateY(0);     opacity: 1;   }
      to   { transform: translateX(-50%) translateY(-72vh); opacity: 0.3; }
    }

    @keyframes shipHitFlash {
      0%   { opacity: 0.7; }
      100% { opacity: 0;   }
    }

    @keyframes shipShake {
      0%   { transform: translateX(0);    }
      20%  { transform: translateX(-9px); }
      50%  { transform: translateX(9px);  }
      75%  { transform: translateX(-5px); }
      100% { transform: translateX(0);    }
    }

    @keyframes boomPop {
      0%   { transform: translate(-50%, 0)    scale(0);   opacity: 1; }
      20%  { transform: translate(-50%, 0)    scale(1.3); opacity: 1; }
      100% { transform: translate(-50%, -80px) scale(1);  opacity: 0; }
    }

    @keyframes legionPulse {
      from { transform: scale(1);    opacity: 0.8; }
      to   { transform: scale(1.35); opacity: 1;   }
    }

    @keyframes shipHover {
      0%, 100% { transform: translateY(0);   }
      50%       { transform: translateY(-5px); }
    }

    @keyframes shieldFlash {
      0%   { transform: translate(-50%,-50%) scale(0.6); opacity: 1; }
      60%  { transform: translate(-50%,-50%) scale(1.1); opacity: 0.8; }
      100% { transform: translate(-50%,-50%) scale(1.4); opacity: 0; }
    }

    @keyframes arcShieldFlash {
      0%   { opacity: 0;   transform: scale(0.85); }
      25%  { opacity: 1;   transform: scale(1.02); }
      70%  { opacity: 0.9; transform: scale(1);    }
      100% { opacity: 0;   transform: scale(1.08); }
    }

    @keyframes lockStrainAnim {
      0%   { transform: scale(1);    }
      30%  { transform: scale(1.12); }
      60%  { transform: scale(1.06); }
      100% { transform: scale(1);    }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Scrollbar (deepdive) */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a0818; }
    ::-webkit-scrollbar-thumb { background: #2a2040; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Load order: data → state → ui → stages → levels → finish → shell -->
  <script src="game/data.js"></script>
  <script src="game/state.js"></script>
  <script type="text/babel" src="game/ui.jsx"></script>
  <script type="text/babel" src="game/stages.jsx"></script>
  <script type="text/babel" src="game/levels.jsx"></script>
  <script type="text/babel" src="game/finish.jsx"></script>
  <script type="text/babel" src="game/shell.jsx"></script>
</body>
</html>
