---
layout: default
---

<div class="rayner-ledger-caption">
  <span class="tick">▸</span>
  <h2>Tags · Index</h2>
  <span class="sub">{{ site.tags | size }} distinct keys across {{ site.posts | size }} essays</span>
</div>

<div style="padding: 16px 0 60px; max-width: 880px;">
  {% assign tags = site.tags | sort %}
  <div style="display: flex; flex-wrap: wrap; gap: 10px 12px; font-family: var(--rayner-mono); font-size: 13px; letter-spacing: 0.02em;">
    {% for tag in tags %}
      {% assign tag_name = tag[0] %}
      {% assign tag_posts = tag[1] %}
      <a href="{{ '/tags/' | append: tag_name | slugify | append: '/' | relative_url }}"
         style="border: 1px solid var(--c-rule-hard); padding: 5px 10px; color: var(--c-ink); background: var(--c-paper-lift);">
        <span style="color: var(--c-accent);">#</span>{{ tag_name }}
        <span style="color: var(--c-ink-mute); font-size: 11px; margin-left: 4px;">({{ tag_posts | size }})</span>
      </a>
    {% endfor %}
  </div>
</div>
